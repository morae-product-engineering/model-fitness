[project]
name = "mmfp"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.29",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["mmfp*"]

[tool.pytest.ini_options]
# Repo root should normally be on sys.path automatically via editable install.

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
