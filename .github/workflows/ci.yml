# MMFP CI pipeline (MLI-162)
#
# Runs on every PR and on push to main. Seven jobs in three tiers:
#
#   tier 1 (parallel)        : lint-python, lint-typescript, unit-python, unit-typescript
#   tier 2 (after tier 1)    : build-and-push  -> two images to ACR
#   tier 3 (after tier 2)    : deploy-dev      -> two Container Apps in dev
#   tier 4 (after tier 3)    : e2e             -> Playwright against deployed dev URL
#
# Auth: OIDC federated credential. No long-lived secrets. Pattern lifted from
# .github/workflows/verify-oidc.yml (MLI-156).
#
# Open design questions answered in the MLI-162 summary comment:
#   Q1 (create-or-update strategy) -> originally `az containerapp up`; the
#                                     escalation trigger fired (PR #11 run
#                                     proved `up` rejects --user-assigned /
#                                     --registry-identity empirically). Now an
#                                     idempotent `show` -> `create` else
#                                     `update` pattern. The flags exist on
#                                     `containerapp create` / `update` (verified
#                                     against Azure CLI extension custom.py).
#   Q2 (Container App names)       -> ca-mmfp-{api,ui}-dev
#   Q3 (UI -> API wiring)          -> external FQDN of the API, set as
#                                     NEXT_PUBLIC_API_URL runtime env var on the
#                                     UI Container App. Works because the
#                                     scoreboard fetch is in a server component
#                                     (runtime-read, not build-time-inlined).
#                                     See deploy-dev step comments.

name: Build, Test, and Deploy

on:
  pull_request:
  push:
    branches: [main]

# Concurrency guard: a newer push to the same ref cancels in-flight runs.
# Keeps the dev environment from being deployed by stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default permissions are read-only; jobs that need OIDC opt in explicitly.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1: lint + unit
  # ---------------------------------------------------------------------------

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dev Dependencies
        run: pip install ".[dev]"

      - name: Run Ruff
        run: ruff check .

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  unit-python:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Package and Dev Dependencies
        run: pip install -e ".[dev]"

      # Note: package was renamed platform/ -> mmfp/ — the path below is the
      # current source root. Stale references to `pytest platform/` in older
      # ticket text are wrong.
      #
      # Slice-acceptance tests (deliberately red until the slice's
      # implementation lands) are excluded here and run by the
      # `slice-acceptance-tests` job below. See CLAUDE.md "Tests" section.
      - name: Run Pytest
        run: pytest -m "not slice_acceptance" mmfp/

  slice-acceptance-tests:
    # Runs only the tests marked @pytest.mark.slice_acceptance. These are
    # deliberately red until the corresponding slice's implementation lands.
    # Belt-and-braces soft-failure: both `continue-on-error: true` and the
    # `|| true` on the pytest invocation. Either alone is sufficient; both
    # together prevent a future engineer from accidentally re-introducing the
    # CI blocker by removing one. See CLAUDE.md "Tests" section.
    name: Slice Acceptance Tests (pytest)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Package and Dev Dependencies
        run: pip install -e ".[dev]"

      - name: Run Slice-Acceptance Tests
        run: pytest -m slice_acceptance mmfp/ || true

  unit-typescript:
    name: Unit Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Tier 2: build and push images to ACR
  # ---------------------------------------------------------------------------

  build-and-push:
    # Logs in via OIDC, computes SHA-tagged image names, builds and pushes both
    # the API and UI Docker images to ACR. On main branch, also re-tags :latest.
    name: Build and Push Images
    needs: [lint-python, lint-typescript, unit-python, unit-typescript]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      api_image: ${{ steps.tags.outputs.api_image }}
      ui_image: ${{ steps.tags.outputs.ui_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log In to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log In to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Compute Image Tags
        id: tags
        run: |
          set -euo pipefail
          API_IMAGE="${{ vars.ACR_LOGIN_SERVER }}/mmfp-api:${{ github.sha }}"
          UI_IMAGE="${{ vars.ACR_LOGIN_SERVER }}/mmfp-ui:${{ github.sha }}"
          echo "api_image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ui_image=${UI_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and Push API Image
        run: |
          set -euo pipefail
          API_IMAGE='${{ steps.tags.outputs.api_image }}'
          # API Dockerfile expects repo root as build context (it COPYs both
          # pyproject.toml and mmfp/).
          docker build -t "${API_IMAGE}" -f mmfp/api/Dockerfile .
          docker push "${API_IMAGE}"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            LATEST='${{ vars.ACR_LOGIN_SERVER }}/mmfp-api:latest'
            docker tag "${API_IMAGE}" "${LATEST}"
            docker push "${LATEST}"
          fi

      - name: Build and Push UI Image
        run: |
          set -euo pipefail
          UI_IMAGE='${{ steps.tags.outputs.ui_image }}'
          # UI Dockerfile expects ui/ as build context.
          docker build -t "${UI_IMAGE}" -f ui/Dockerfile ui
          docker push "${UI_IMAGE}"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            LATEST='${{ vars.ACR_LOGIN_SERVER }}/mmfp-ui:latest'
            docker tag "${UI_IMAGE}" "${LATEST}"
            docker push "${LATEST}"
          fi

  # ---------------------------------------------------------------------------
  # Tier 3: deploy to Azure Container Apps (dev environment)
  # ---------------------------------------------------------------------------

  deploy-dev:
    # Logs in via OIDC, then idempotently creates or updates both Container Apps
    # in the dev environment. Resolves the API FQDN and wires it into the UI at
    # runtime. Writes a deploy summary to the step summary.
    name: Deploy Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      mmfp_url: ${{ steps.deploy_ui.outputs.mmfp_url }}
    env:
      RG: ${{ vars.AZURE_RESOURCE_GROUP }}
      CAE: ${{ vars.AZURE_CONTAINER_APPS_ENVIRONMENT }}
      API_APP: ca-mmfp-api-dev
      UI_APP: ca-mmfp-ui-dev
      API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
      UI_IMAGE: ${{ needs.build-and-push.outputs.ui_image }}
    steps:
      - name: Log In to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Q1 escalation: `az containerapp up` does NOT in practice accept
      # --user-assigned / --registry-identity (empirically verified by PR #11's
      # failed run, despite the extension source suggesting otherwise). We've
      # split into an idempotent show -> create / update pattern. Both
      # `containerapp create` and `containerapp update` accept the identity
      # flags. Revisit when we need per-revision traffic splits, custom probes,
      # multi-env config sets, or IaC-managed scale rules.
      - name: Deploy API Container App
        id: deploy_api
        run: |
          set -euo pipefail
          # ACR admin user is disabled (correct security posture), so registry
          # auth uses an AcrPull-scoped user-assigned managed identity that is
          # pre-provisioned and role-assigned out-of-band.
          if az containerapp show --name "${API_APP}" --resource-group "${RG}" >/dev/null 2>&1; then
            az containerapp update \
              --name "${API_APP}" \
              --resource-group "${RG}" \
              --image "${API_IMAGE}"
          else
            az containerapp create \
              --name "${API_APP}" \
              --resource-group "${RG}" \
              --environment "${CAE}" \
              --image "${API_IMAGE}" \
              --target-port 8000 \
              --ingress external \
              --registry-server '${{ vars.ACR_LOGIN_SERVER }}' \
              --registry-identity '${{ vars.AZURE_USER_MANAGED_IDENTITY_RESOURCE_ID }}' \
              --user-assigned '${{ vars.AZURE_USER_MANAGED_IDENTITY_RESOURCE_ID }}'
          fi
          API_FQDN=$(az containerapp show \
            --name "${API_APP}" --resource-group "${RG}" \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          echo "api_url=https://${API_FQDN}" >> "$GITHUB_OUTPUT"

      # Q3 decision (and the load-bearing nuance): `NEXT_PUBLIC_*` is normally
      # baked at build time by Next.js for client-bundle access. The Slice 1
      # scoreboard fetch lives in a SERVER component (app/scoreboard/page.tsx),
      # so process.env.NEXT_PUBLIC_API_URL is read at runtime in the Node
      # container — runtime env vars work. Setting it on the Container App is
      # sufficient for now.
      #
      # FOLLOW-UP (when first client component references the URL):
      # client-bundle references resolve to the empty string baked at build
      # time. Two options when that bites: (a) Docker --build-arg to pass the
      # URL into `next build` (accept env-specific images); or (b) move to a
      # runtime-fetched /config endpoint. Document in an ADR before the change.
      - name: Deploy UI Container App
        id: deploy_ui
        run: |
          set -euo pipefail
          API_URL='${{ steps.deploy_api.outputs.api_url }}'
          # See "Deploy API Container App" step for the rationale on --user-assigned /
          # --registry-identity. Same managed identity, same AcrPull role.
          # Note: `containerapp create` uses --env-vars; `containerapp update`
          # uses --set-env-vars. Verified against the Azure CLI extension
          # custom.py (`create_containerapp` accepts env_vars,
          # `update_containerapp_logic` accepts set_env_vars).
          if az containerapp show --name "${UI_APP}" --resource-group "${RG}" >/dev/null 2>&1; then
            az containerapp update \
              --name "${UI_APP}" \
              --resource-group "${RG}" \
              --image "${UI_IMAGE}" \
              --set-env-vars "NEXT_PUBLIC_API_URL=${API_URL}"
          else
            az containerapp create \
              --name "${UI_APP}" \
              --resource-group "${RG}" \
              --environment "${CAE}" \
              --image "${UI_IMAGE}" \
              --target-port 3000 \
              --ingress external \
              --registry-server '${{ vars.ACR_LOGIN_SERVER }}' \
              --registry-identity '${{ vars.AZURE_USER_MANAGED_IDENTITY_RESOURCE_ID }}' \
              --user-assigned '${{ vars.AZURE_USER_MANAGED_IDENTITY_RESOURCE_ID }}' \
              --env-vars "NEXT_PUBLIC_API_URL=${API_URL}"
          fi
          UI_FQDN=$(az containerapp show \
            --name "${UI_APP}" --resource-group "${RG}" \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          echo "mmfp_url=https://${UI_FQDN}" >> "$GITHUB_OUTPUT"

      # MLI-261: tell the API which UI origin to allow for browser-issued
      # fetches (candidate-detail drill-down is client-side; without this the
      # browser blocks the response). Done after the UI deploys so the FQDN is
      # known. A no-op revision is created only when the env var actually
      # changes — Container Apps deduplicates identical configurations.
      - name: Configure API CORS Allowed Origins
        run: |
          set -euo pipefail
          UI_URL='${{ steps.deploy_ui.outputs.mmfp_url }}'
          az containerapp update \
            --name "${API_APP}" \
            --resource-group "${RG}" \
            --set-env-vars "MMFP_CORS_ALLOWED_ORIGINS=${UI_URL}"

      - name: Write Deploy Summary
        run: |
          {
            echo "### Dev deploy"
            echo ""
            echo "- **API:** ${{ steps.deploy_api.outputs.api_url }}"
            echo "- **UI:**  ${{ steps.deploy_ui.outputs.mmfp_url }}"
            echo "- **Image (api):** \`${API_IMAGE}\`"
            echo "- **Image (ui):**  \`${UI_IMAGE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Tier 4: end-to-end test against the deployed dev environment
  # ---------------------------------------------------------------------------

  e2e:
    # Installs dependencies, launches Playwright against the deployed dev URL,
    # publishes the TestRail run link, uploads the HTML report both as a GHA
    # artifact and to the Azure Storage static website on the seed account.
    name: End-to-End Tests (Playwright)
    needs: deploy-dev
    runs-on: ubuntu-latest
    # Hard gate for the regular e2e suite: runs every spec EXCEPT the
    # @slice-acceptance-tagged ones. Those are deliberately red until their
    # slice's implementation lands and run in the soft-failed
    # `e2e-slice-acceptance` job below. A genuine regression in the regular
    # suite must still red the workflow, so this stays continue-on-error:
    # false. (MLI-363: this comment previously claimed the job tolerated
    # deliberate-red specs while the value said the opposite; that toleration
    # now lives in the dedicated soft-fail lane, so comment and value agree.)
    continue-on-error: false
    # MLI-178: OIDC opt-in for the static-website upload step. The job already
    # consumes secrets, but `azure/login@v2` needs id-token: write to mint
    # the federated credential.
    permissions:
      id-token: write
      contents: read
    env:
      MMFP_URL: ${{ needs.deploy-dev.outputs.mmfp_url }}
      MMFP_BASIC_AUTH_USER: ${{ secrets.MMFP_BASIC_AUTH_USER }}
      MMFP_BASIC_AUTH_PASS: ${{ secrets.MMFP_BASIC_AUTH_PASS }}
      TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
      TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      TESTRAIL_PROJECT_ID: ${{ vars.TESTRAIL_PROJECT_ID }}
      TESTRAIL_SUITE_SLICE_01: ${{ vars.TESTRAIL_SUITE_SLICE_01 }}
      # MLI-178: slice-2 TestRail suite. Empty until Wayne creates the suite
      # + sets the var; the reporter no-ops gracefully on missing suite IDs.
      TESTRAIL_SUITE_SLICE_02: ${{ vars.TESTRAIL_SUITE_SLICE_02 }}
      TESTRAIL_SUITE_SLICE_03: ${{ vars.TESTRAIL_SUITE_SLICE_03 }}
      TESTRAIL_SUITE_SLICE_03P5: ${{ vars.TESTRAIL_SUITE_SLICE_03P5 }}
      TESTRAIL_SUITE_SLICE_04: ${{ vars.TESTRAIL_SUITE_SLICE_04 }}
      TESTRAIL_SUITE_SLICE_06: ${{ vars.TESTRAIL_SUITE_SLICE_06 }}
      # MLI-178: where the Playwright HTML report lands as a browsable site.
      STORAGE_ACCOUNT: ${{ vars.MMFP_SEED_STORAGE_ACCOUNT }}
      REPORT_WEB_BASE_URL: ${{ vars.MMFP_REPORT_STATIC_WEBSITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run End-to-End Tests
        # Run from repo root so the testrail-reporter writes
        # testrail-run-url.txt (it uses process.cwd()) at a path the next
        # step can find. The reporter exits 0 even if TestRail is degraded.
        # Excludes @slice-acceptance-tagged specs; those run in the soft-fail
        # `e2e-slice-acceptance` job below (MLI-363).
        run: npx playwright test --grep-invert "@slice-acceptance"

      # Run regardless of test outcome so the TestRail link surfaces on red
      # runs too. The reporter writes the file in the working directory; we
      # search for it rather than hardcode in case a future config change
      # moves the cwd.
      - name: Append TestRail URL to Summary
        if: always()
        run: |
          set -euo pipefail
          FILE=$(find . -maxdepth 3 -name testrail-run-url.txt -print -quit)
          if [[ -n "${FILE:-}" && -s "${FILE}" ]]; then
            URL=$(cat "${FILE}")
            echo "TestRail run: ${URL}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_TestRail run URL not produced (reporter degraded or env vars missing)._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14

      # MLI-178: AC asks for the report on the storage static website too.
      # Skipped silently if the storage-account var isn't set, so PR forks
      # (or future repos lifting this workflow) don't fail on a missing var.
      - name: Log in to Azure (OIDC)
        if: ${{ always() && vars.MMFP_SEED_STORAGE_ACCOUNT != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload Playwright report to static website
        # The e2e job's pass/fail conclusion is about the spec, not the
        # report-hosting AC. Static-website enablement on the storage
        # account is a one-off infra step; if it hasn't landed yet, the
        # upload errors, this step soft-fails, and the step summary still
        # surfaces what was attempted.
        if: ${{ always() && vars.MMFP_SEED_STORAGE_ACCOUNT != '' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [[ ! -d playwright-report ]]; then
            echo "::warning::playwright-report directory missing; skipping static-website upload"
            exit 0
          fi

          # Path-shape rationale: <run_id>/<attempt> keeps re-runs separate,
          # supports the "3 consecutive runs" flake-check by surfacing three
          # distinct URLs in three workflow runs. Index path is the standard
          # Playwright entry file.
          DEST_PREFIX="reports/${{ github.run_id }}/${{ github.run_attempt }}"

          az storage blob upload-batch \
            --account-name "${STORAGE_ACCOUNT}" \
            --destination '$web' \
            --destination-path "${DEST_PREFIX}" \
            --source playwright-report \
            --auth-mode login \
            --overwrite \
            > /dev/null

          if [[ -n "${REPORT_WEB_BASE_URL:-}" ]]; then
            REPORT_URL="${REPORT_WEB_BASE_URL%/}/${DEST_PREFIX}/index.html"
            echo "Playwright report (browsable): ${REPORT_URL}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Static-website base URL not set (MMFP_REPORT_STATIC_WEBSITE_URL); report uploaded to $web/${DEST_PREFIX}/ on ${STORAGE_ACCOUNT}._" >> "$GITHUB_STEP_SUMMARY"
          fi

  e2e-slice-acceptance:
    # E2E analogue of the `slice-acceptance-tests` (pytest) job. Runs ONLY the
    # specs tagged `@slice-acceptance` — the per-slice acceptance gates, which
    # ship deliberately red and go green when their slice's implementation
    # lands (e.g. slice-04-editor.spec.ts is red until the /editor route ships,
    # MLI-191/MLI-363). Belt-and-braces soft-failure: both `continue-on-error:
    # true` and `|| true` on the invocation. Either alone suffices; both stop a
    # future engineer reintroducing the CI blocker by removing one. Failures
    # stay visible via the uploaded HTML report and the TestRail run link —
    # soft-failed, not suppressed. See CLAUDE.md "Tests" section.
    name: Slice Acceptance Tests (Playwright)
    needs: deploy-dev
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      MMFP_URL: ${{ needs.deploy-dev.outputs.mmfp_url }}
      MMFP_BASIC_AUTH_USER: ${{ secrets.MMFP_BASIC_AUTH_USER }}
      MMFP_BASIC_AUTH_PASS: ${{ secrets.MMFP_BASIC_AUTH_PASS }}
      TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
      TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      TESTRAIL_PROJECT_ID: ${{ vars.TESTRAIL_PROJECT_ID }}
      TESTRAIL_SUITE_SLICE_01: ${{ vars.TESTRAIL_SUITE_SLICE_01 }}
      TESTRAIL_SUITE_SLICE_02: ${{ vars.TESTRAIL_SUITE_SLICE_02 }}
      TESTRAIL_SUITE_SLICE_03: ${{ vars.TESTRAIL_SUITE_SLICE_03 }}
      TESTRAIL_SUITE_SLICE_03P5: ${{ vars.TESTRAIL_SUITE_SLICE_03P5 }}
      TESTRAIL_SUITE_SLICE_04: ${{ vars.TESTRAIL_SUITE_SLICE_04 }}
      TESTRAIL_SUITE_SLICE_06: ${{ vars.TESTRAIL_SUITE_SLICE_06 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Slice-Acceptance E2E Tests
        # Only the @slice-acceptance-tagged specs. `|| true` is belt-and-braces
        # with the job-level continue-on-error so a red slice gate never blocks.
        run: npx playwright test --grep "@slice-acceptance" || true

      - name: Append TestRail URL to Summary
        if: always()
        run: |
          set -euo pipefail
          FILE=$(find . -maxdepth 3 -name testrail-run-url.txt -print -quit)
          if [[ -n "${FILE:-}" && -s "${FILE}" ]]; then
            URL=$(cat "${FILE}")
            echo "TestRail run (slice-acceptance): ${URL}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_TestRail run URL not produced (reporter degraded or env vars missing)._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-slice-acceptance
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14
