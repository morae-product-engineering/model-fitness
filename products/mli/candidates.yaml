# MLI candidate slate — 10 Foundry deployments per MLI-166. Tier candidacy
# is recorded once, here. Do not duplicate to deployment tags or other configs
# (MLI-165 single-source-of-truth rule).
#
# `max_tokens` is per-candidate, no default. Reasoning-class models (Kimi-K2.6
# in this slate) need budget headroom for the reasoning trace before visible
# content emits — see MLI-165 §1 / MLI-166 smoke-test findings.
#
# Endpoint and account key live in dev Key Vault (`foundry-account-endpoint`,
# `foundry-account-key`), shared across all 10 deployments. The binding plugin
# (mmfp/bindings/foundry) reads them at runtime; this file is safe to commit.

schema_version: v1

candidates:
  # ---- Tier 1 — Classification & Routing ----
  - id: phi-4-mini-instruct
    display_name: Phi-4 mini instruct
    family: chat
    max_tokens: 1024
    tiers: [tier_1]
    binding:
      provider: azure_foundry
      endpoint: https://mmfp-dev-models-resource.cognitiveservices.azure.com
      deployment: Phi-4-mini-instruct
      api_version: "2024-12-01-preview"
      auth_method: api_key_header
      key_vault_secret_name: foundry-account-key
    status: under_evaluation

  - id: gpt-4-1-nano
