  - id: kimi-k2-6
    display_name: Kimi K2.6
    family: reasoning
    # MLI-166 confirmed Kimi spends 100+ completion tokens on reasoning before
    # emitting visible content. 4096 gives enough headroom for Tier 2/Tier 3
    # outputs after the reasoning trace; raise if cells start truncating.
    max_tokens: 4096
